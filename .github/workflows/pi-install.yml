name: Pi Install

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  install:
    name: pi install (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pi-coding-agent
        run: npm install --global @mariozechner/pi-coding-agent

      - name: Show Pi version
        run: pi --version

      - name: Install pi-web from GitHub
        env:
          PI_INSTALL_REPO:
            ${{ github.event.pull_request.head.repo.full_name ||
            github.repository }}
          PI_INSTALL_REF:
            ${{ github.event.pull_request.head.sha || github.sha }}
        run:
          pi install git:https://github.com/${{ env.PI_INSTALL_REPO }}@${{
          env.PI_INSTALL_REF }}
